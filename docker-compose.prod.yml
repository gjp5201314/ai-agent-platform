# ============================================================
# AI Agent Platform - Docker Compose (Production / Swarm)
# ============================================================
# 生产环境部署文件，使用阿里云 ACR 镜像 + Docker Swarm 滚动更新
#
# 首次部署: bash scripts/swarm-init.sh
# 滚动更新: bash scripts/swarm-update.sh
#
# 服务:
#   - postgres  : PostgreSQL 16 + pgvector (向量数据库, replicas=1)
#   - redis     : Redis 7 (缓存, replicas=1)
#   - sandbox   : DifySandbox (安全代码执行, replicas=1)
#   - backend   : FastAPI + LangGraph (replicas=2, 滚动更新)
#   - frontend  : React + nginx (replicas=1)
# ============================================================

services:
  # ---- Database ----
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-aiagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-aiagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  # ---- Cache ----
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_secure_password} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  # ---- Sandbox (DifySandbox - secure code execution) ----
  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    environment:
      API_KEY: ${DIFYSANDBOX_API_KEY:-dify-sandbox}
      SANDBOX_PORT: "8194"
      WORKER_TIMEOUT: "30"
      MAX_WORKERS: "4"
      MAX_REQUESTS: "50"
      ENABLE_NETWORK: "false"
      PIP_CACHE_DIR: /root/.cache/pip
    volumes:
      - sandbox_deps:/sandbox/dependencies
      - sandbox_pip_cache:/root/.cache/pip
    # Seccomp fix: DifySandbox needs SETUID/SETGID for Python code execution
    cap_add:
      - SETUID
      - SETGID
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8194/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

  # ---- Backend (FastAPI + LangGraph) ----
  # Swarm 模式下由内建 DNS 自动对 replicas 做 round-robin 负载均衡
  backend:
    image: ${ACR_REGISTRY}/backend:${IMAGE_TAG:-latest}
    ports:
      - 8000:8000
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      APP_HOST: "0.0.0.0"
      APP_DEBUG: "false"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/${POSTGRES_DB:-aiagent}"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DIFYSANDBOX_URL: http://sandbox:8194
      DIFYSANDBOX_API_KEY: ${DIFYSANDBOX_API_KEY:-dify-sandbox}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-ai-agent-platform}
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8000/api/v1/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      # 加宽启动窗口: LangGraph + DB/Redis 握手 + 迁移可能需要 30~50s
      start_period: 60s
    deploy:
      # replicas=1: 2GB 服务器只能撑 1 个 backend 实例
      # 升级到 4GB+ 后可改为 2，配合 workers=2
      replicas: 1
      update_config:
        order: start-first   # Swarm routing mesh handles port conflict, zero-downtime
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ---- Frontend (React + nginx) ----
  frontend:
    image: ${ACR_REGISTRY}/frontend:${IMAGE_TAG:-latest}
    ports:
      - 80:80
    environment:
      BACKEND_URL: http://backend:8000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3

volumes:
  postgres_data:
  redis_data:
  sandbox_deps:
  sandbox_pip_cache:
