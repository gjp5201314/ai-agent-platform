name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          PORT: ${{ secrets.SERVER_PORT || 22 }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Pack code (exclude .git to reduce transfer size)
          tar czf /tmp/code.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            .

          # Upload to server
          sshpass -e scp -P "$PORT" /tmp/code.tar.gz "$USER@$HOST:/tmp/code.tar.gz"

          # Extract, build, restart
          sshpass -e ssh -p "$PORT" "$USER@$HOST" bash -s << 'ENDSCRIPT'
            set -e
            cd ~/ai-agent-platform

            echo ">>> 解压最新代码..."
            tar xzf /tmp/code.tar.gz

            echo ">>> 重新构建后端镜像..."
            docker compose build backend --no-cache

            echo ">>> 重新构建前端镜像..."
            docker compose build frontend

            echo ">>> 重启服务..."
            docker compose up -d

            echo ">>> 等待服务就绪..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo ">>> 后端服务已就绪!"
                break
              fi
              echo ">>> 等待中... ($i/15)"
              sleep 5
            done

            echo ">>> 清理旧镜像..."
            docker image prune -f

            echo ">>> 部署完成!"
            docker compose ps
          ENDSCRIPT
