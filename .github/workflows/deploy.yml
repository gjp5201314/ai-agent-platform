name: Build & Deploy (ACR + Swarm)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像 Tag（默认用 commit sha）'
        default: ''
        required: false

env:
  # === 阿里云 ACR 配置 ===
  # 个人版免费，国内速度极快
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/backend:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/frontend:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Deploy to Server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          PORT: ${{ secrets.SERVER_PORT || 22 }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # ============================================
          # Step 1: 上传 compose 文件和脚本
          # ============================================
          echo ">>> 上传部署文件..."
          sshpass -e scp -P "$PORT" docker-compose.prod.yml "$USER@$HOST:~/ai-agent-platform/"
          sshpass -e scp -P "$PORT" -r scripts/ "$USER@$HOST:~/ai-agent-platform/"

          # ============================================
          # Step 2: 远程执行滚动更新
          # ============================================
          sshpass -e ssh -p "$PORT" "$USER@$HOST" bash -s << 'ENDSCRIPT'
            set -e
            cd ~/ai-agent-platform

            IMAGE_TAG="${IMAGE_TAG:-latest}"
            STACK_NAME="${STACK_NAME:-ai-agent}"

            # 加载环境变量
            if [ -f "backend/.env" ]; then
              set -a
              source backend/.env 2>/dev/null || true
              set +a
            fi

            echo ">>> 登录 ACR..."
            echo "${ACR_PASSWORD:-$SSHPASS}" | docker login \
              --username="${ACR_USERNAME}" \
              --password-stdin \
              "${ACR_REGISTRY%%/*}" 2>/dev/null || true

            echo ">>> 拉取镜像: backend:${IMAGE_TAG}"
            docker pull "${ACR_REGISTRY}/${ACR_NAMESPACE}/backend:${IMAGE_TAG}"

            echo ">>> 拉取镜像: frontend:${IMAGE_TAG}"
            docker pull "${ACR_REGISTRY}/${ACR_NAMESPACE}/frontend:${IMAGE_TAG}"

            echo ">>> 滚动更新 backend（零停机）..."
            docker service update \
              --image "${ACR_REGISTRY}/${ACR_NAMESPACE}/backend:${IMAGE_TAG}" \
              --update-parallelism 1 \
              --update-delay 10s \
              --update-order start-first \
              --update-failure-action rollback \
              "${STACK_NAME}_backend" 2>/dev/null || {
                echo ">>> Stack 不存在，执行首次部署..."
                docker compose -f docker-compose.prod.yml config | docker stack deploy -c - "${STACK_NAME}"
              }

            # 等待 backend 滚动更新完成
            for i in $(seq 1 40); do
              STATE=$(docker service inspect "${STACK_NAME}_backend" --format '{{.UpdateStatus.State}}' 2>/dev/null || echo "none")
              if [ "$STATE" = "completed" ]; then
                echo ">>> backend 更新完成!"
                break
              elif [ "$STATE" = "rollback_completed" ]; then
                echo "!!! backend 更新失败，已自动回滚!"
                exit 1
              fi
              echo ">>> 更新中... ($i/40) 状态: $STATE"
              sleep 3
            done

            echo ">>> 更新 frontend..."
            docker service update \
              --image "${ACR_REGISTRY}/${ACR_NAMESPACE}/frontend:${IMAGE_TAG}" \
              --update-order start-first \
              --update-failure-action rollback \
              "${STACK_NAME}_frontend"

            echo ">>> 健康检查..."
            sleep 5
            curl -sf -X POST http://localhost:8000/api/v1/health && echo ">>> 后端 OK" || echo ">>> 后端健康检查失败"
            curl -sf http://localhost:80/ && echo ">>> 前端 OK" || echo ">>> 前端健康检查失败"

            echo ">>> 清理旧镜像..."
            docker image prune -f

            echo ">>> 当前运行的服务:"
            docker service ls --filter "name=${STACK_NAME}"
          ENDSCRIPT
