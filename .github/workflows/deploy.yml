name: Build & Deploy (ACR + Swarm)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像 Tag（默认用 commit sha）'
        default: ''
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          # ACR_REGISTRY 格式: crpi-xxx.cn-hangzhou.personal.cr.aliyuncs.com/命名空间
          # %%/* 提取纯域名用于登录
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/backend:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
        env:
          BUILDKIT_PROGRESS: plain

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/frontend:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
        env:
          BUILDKIT_PROGRESS: plain

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Deploy to Server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          PORT: ${{ secrets.SERVER_PORT || 22 }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo ">>> 上传 compose 文件..."
          sshpass -e scp -P "$PORT" docker-compose.prod.yml "$USER@$HOST:~/ai-agent-platform/"
          sshpass -e scp -P "$PORT" -r scripts/ "$USER@$HOST:~/ai-agent-platform/"

          echo ">>> SSH 执行部署..."
          sshpass -e ssh -p "$PORT" "$USER@$HOST" bash -s << 'ENDSCRIPT'
            set -e
            cd ~/ai-agent-platform

            IMAGE_TAG="${IMAGE_TAG:-latest}"
            STACK_NAME="${STACK_NAME:-ai-agent}"

            # 加载环境变量
            if [ -f "backend/.env" ]; then
              set -a
              source backend/.env 2>/dev/null || true
              set +a
            fi

            # 登录 ACR（提取纯域名）
            echo ">>> 登录 ACR..."
            echo "${ACR_PASSWORD:-$SSHPASS}" | docker login \
              --username="${ACR_USERNAME}" \
              --password-stdin \
              "${ACR_REGISTRY%%/*}" 2>/dev/null || true

            echo ">>> 拉取 backend:${IMAGE_TAG}"
            docker pull "${ACR_REGISTRY}/backend:${IMAGE_TAG}"

            echo ">>> 拉取 frontend:${IMAGE_TAG}"
            docker pull "${ACR_REGISTRY}/frontend:${IMAGE_TAG}"

            # 直接用 stack deploy — config 变更（workers/replicas/healthcheck）也会被应用
            echo ">>> 更新 Stack（replicas=1 / stop-first）..."
            export ACR_REGISTRY IMAGE_TAG
            docker stack deploy -c docker-compose.prod.yml "${STACK_NAME}"

            # 强制 force update：防止 Swarm 缓存旧 image 导致服务不重启
            echo ">>> 强制 force update backend 和 frontend..."
            docker service update --force --with-registry-auth "${STACK_NAME}_backend" 2>&1 || echo "force update backend 失败，继续"
            docker service update --force --with-registry-auth "${STACK_NAME}_frontend" 2>&1 || echo "force update frontend 失败，继续"

            # 等待 backend 就绪
            echo ">>> 等待 backend 健康检查..."
            for i in $(seq 1 30); do
              TASKS=$(docker service ps "${STACK_NAME}_backend" --no-trunc --format '{{.CurrentState}}' 2>/dev/null | head -3 | tr '\n' '|')
              if curl -sf -X POST http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo ">>> backend 就绪！(${i}/30)"
                break
              fi
              echo ">>> [$i/30] $TASKS"
              sleep 5
            done

            echo ">>> 健康检查验证..."
            curl -sf -X POST http://localhost:8000/api/v1/health && echo ">>> 后端 OK" || echo ">>> 后端健康检查失败"
            curl -sf http://localhost:80/ && echo ">>> 前端 OK" || echo ">>> 前端健康检查失败"

            echo ">>> 当前服务状态:"
            docker service ls --filter "name=${STACK_NAME}"
          ENDSCRIPT
