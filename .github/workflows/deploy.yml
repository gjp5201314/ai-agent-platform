name: Build & Deploy (ACR + Swarm)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像 Tag（默认用 commit sha）'
        default: ''
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          # ACR_REGISTRY 格式: crpi-xxx.cn-hangzhou.personal.cr.aliyuncs.com/命名空间
          # %%/* 提取纯域名用于登录
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/backend:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
        env:
          BUILDKIT_PROGRESS: plain

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/frontend:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.ACR_REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
        env:
          BUILDKIT_PROGRESS: plain

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Deploy to Server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          PORT: ${{ secrets.SERVER_PORT || 22 }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo ">>> 上传 compose 文件..."
          sshpass -e scp -P "$PORT" docker-compose.prod.yml "$USER@$HOST:~/ai-agent-platform/"
          sshpass -e scp -P "$PORT" -r scripts/ "$USER@$HOST:~/ai-agent-platform/"

          echo ">>> SSH 执行部署 (IMAGE_TAG=$IMAGE_TAG)..."
          # ★ 关键修复: 把 IMAGE_TAG 显式传给远端 bash，SSH 不会自动转发环境变量
          sshpass -e ssh -p "$PORT" "$USER@$HOST" \
            "IMAGE_TAG=${IMAGE_TAG} bash -s" << 'ENDSCRIPT'
            set -e
            cd ~/ai-agent-platform

            STACK_NAME="${STACK_NAME:-ai-agent}"

            # 加载服务器端 .env（ACR 凭证等）
            if [ -f "backend/.env" ]; then
              while IFS='=' read -r key value; do
                case "$key" in \#*|"") continue; esac
                value="${value%\"}"; value="${value#\"}"
                value="${value%\'}"; value="${value#\'}"
                export "$key"="$value"
              done < backend/.env
              echo ">>> 已加载 backend/.env"
            fi

            echo ">>> IMAGE_TAG=${IMAGE_TAG}"
            echo ">>> ACR_REGISTRY=${ACR_REGISTRY}"
            echo ">>> DOMAIN=${DOMAIN:-未设置}"

            # 登录 ACR（从服务器 .env 读取凭证）
            if [ -n "${ACR_PASSWORD}" ] && [ -n "${ACR_REGISTRY}" ]; then
              echo ">>> 登录 ACR..."
              echo "${ACR_PASSWORD}" | docker login \
                --username="${ACR_USERNAME}" \
                --password-stdin \
                "${ACR_REGISTRY%%/*}"
            else
              echo ">>> ACR 凭证未配置，跳过登录"
            fi

            # 拉取指定 SHA 镜像（不是 latest！）
            echo ">>> 拉取 backend:${IMAGE_TAG}"
            docker pull "${ACR_REGISTRY}/backend:${IMAGE_TAG}"

            echo ">>> 拉取 frontend:${IMAGE_TAG}"
            docker pull "${ACR_REGISTRY}/frontend:${IMAGE_TAG}"

            # ★ 两步部署:
            #   Step 1: docker stack deploy — 首次部署 + 应用 compose 变更（config/replicas/healthcheck）
            #   Step 2: docker service update --image — 强制指向 SHA tag（解决 latest 不更新的问题）
            echo ">>> 同步 Stack 配置..."
            export ACR_REGISTRY IMAGE_TAG
            docker stack deploy -c docker-compose.prod.yml "${STACK_NAME}" --resolve-image never 2>/dev/null || \
              docker stack deploy -c docker-compose.prod.yml "${STACK_NAME}"

            echo ">>> 更新 backend → ${ACR_REGISTRY}/backend:${IMAGE_TAG}"
            docker service update \
              --image "${ACR_REGISTRY}/backend:${IMAGE_TAG}" \
              --update-order start-first \
              --update-failure-action rollback \
              --update-monitor 20s \
              "${STACK_NAME}_backend" 2>/dev/null || echo ">>> (首次部署跳过 backend update)"

            echo ">>> 更新 frontend → ${ACR_REGISTRY}/frontend:${IMAGE_TAG}"
            docker service update \
              --image "${ACR_REGISTRY}/frontend:${IMAGE_TAG}" \
              --update-order start-first \
              --update-failure-action rollback \
              "${STACK_NAME}_frontend" 2>/dev/null || echo ">>> (首次部署跳过 frontend update)"

            # 等待 backend 就绪
            echo ">>> 等待 backend 健康检查..."
            for i in $(seq 1 30); do
              if curl -sf -X POST http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo ">>> backend 就绪！(${i}/30)"
                break
              fi
              echo ">>> [$i/30] 等待中..."
              sleep 5
            done

            echo ">>> 健康检查验证..."
            curl -sf -X POST http://localhost:8000/api/v1/health && echo ">>> 后端 OK" || echo ">>> 后端健康检查失败"
            curl -sf http://localhost:80/ && echo ">>> 前端 HTTP OK" || echo ">>> 前端 HTTP 检查失败"
            if [ -n "${DOMAIN}" ]; then
              curl -sfk https://localhost/ && echo ">>> 前端 HTTPS OK" || echo ">>> 前端 HTTPS 检查失败（证书可能尚未配置，运行 setup-https.sh）"
            fi

            echo ">>> 当前服务状态:"
            docker service ls --filter "name=${STACK_NAME}"
          ENDSCRIPT
