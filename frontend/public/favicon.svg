<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4D6BFE"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Chat bubble -->
  <path d="M18 22 h28 a4 4 0 0 1 4 4 v14 a4 4 0 0 1 -4 4 h-18 l-7 6 v-6 h-3 a4 4 0 0 1 -4 -4 v-14 a4 4 0 0 1 4 -4 z"
        fill="#fff" opacity="0.97"/>
  <!-- Three dots inside (chat) -->
  <circle cx="26" cy="33" r="2.2" fill="#4D6BFE"/>
  <circle cx="32" cy="33" r="2.2" fill="#4D6BFE"/>
  <circle cx="38" cy="33" r="2.2" fill="#4D6BFE"/>
  <!-- AI spark -->
  <g fill="url(#spark)">
    <path d="M50 12 l1.5 3.5 3.5 1.5 -3.5 1.5 -1.5 3.5 -1.5 -3.5 -3.5 -1.5 3.5 -1.5 z"/>
    <circle cx="11" cy="48" r="1.2"/>
    <circle cx="56" cy="46" r="1.4"/>
  </g>
</svg>
