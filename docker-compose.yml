# ============================================================
# AI Agent Platform - Docker Compose
# ============================================================
# One-command deployment: docker compose up -d
#
# Services:
#   - postgres  : PostgreSQL 16 + pgvector (vector DB)
#   - redis     : Redis 7 (session / rate limiting)
#   - sandbox   : DifySandbox (secure code execution)
#   - backend   : FastAPI + LangGraph + LangSmith
#   - frontend  : React + nginx (serves UI + reverse proxy)
# ============================================================

services:
  # ---- Database ----
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-aiagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-aiagent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Cache ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_secure_password} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---- Sandbox (DifySandbox - secure code execution) ----
  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: unless-stopped
    environment:
      API_KEY: ${DIFYSANDBOX_API_KEY:-dify-sandbox}
      SANDBOX_PORT: "8194"
      WORKER_TIMEOUT: "30"
      MAX_WORKERS: "4"
      MAX_REQUESTS: "50"
      ENABLE_NETWORK: "false"
      # Persistent dependency storage
      PIP_CACHE_DIR: /root/.cache/pip
      PYTHONPATH: /sandbox/dependencies
      # Pre-install common data science packages at boot
      INIT_SCRIPT: |
        pip install --quiet numpy pandas matplotlib 2>/dev/null || true
    expose:
      - "8194"
    # Seccomp fix: DifySandbox needs SETUID/SETGID for Python code execution.
    # Without these, code execution fails with "operation not permitted".
    cap_add:
      - SETUID
      - SETGID
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - sandbox_deps:/sandbox/dependencies
      - sandbox_pip_cache:/root/.cache/pip
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8194/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---- Backend (FastAPI + LangGraph) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Docker 环境强制覆盖 — 无视 .env 中的 localhost 开发配置
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DIFYSANDBOX_URL: http://sandbox:8194
      DIFYSANDBOX_API_KEY: ${DIFYSANDBOX_API_KEY:-dify-sandbox}
      APP_HOST: "0.0.0.0"
      APP_DEBUG: "false"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/${POSTGRES_DB:-aiagent}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8000/api/v1/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Optional: mount for development hot-reload
    # volumes:
    #   - ./backend:/app

  # ---- Frontend (React + nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro

  # ---- Certbot (Let's Encrypt auto-cert) ----
  # Initial cert: run scripts/setup-https.sh on server (one-time)
  # Renewal: this service renews every 12h
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: |
      sh -c '
      echo ">>> Certbot renewal watcher started (domain=$${DOMAIN})"
      while true; do
        if [ -d /etc/letsencrypt/live/$${DOMAIN} ]; then
          if [ -n "$${DUCKDNS_TOKEN}" ]; then
            echo ">>> Renew via DNS (DuckDNS)"
            certbot renew --quiet \
              --manual-auth-hook "/opt/duckdns-auth.sh auth" \
              --manual-cleanup-hook "/opt/duckdns-auth.sh cleanup"
          else
            echo ">>> Renew via HTTP (webroot)"
            certbot renew --webroot -w /var/www/certbot --quiet
          fi
        fi
        sleep 12h
      done
      '
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CERT_EMAIL: ${CERT_EMAIL:-admin@example.com}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  sandbox_deps:
  sandbox_pip_cache:
  certs:
  certbot_webroot:
