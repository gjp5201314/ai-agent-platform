<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>AI Agent Platform · 后端</title>
<style>
:root {
  --bg: #f8f9fc;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text2: #555;
  --text3: #888;
  --border: #e8ecf1;
  --accent: #4D6BFE;
  --accent-light: #eef0ff;
  --tag-bg: #f0f2ff;
  --tag-text: #4D6BFE;
  --code-bg: #f4f5f9;
  --green: #10b981;
  --orange: #f59e0b;
  --purple: #7c3aed;
  --red: #ef4444;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-hover: 0 4px 16px rgba(0,0,0,.1);
}
.dark {
  --bg: #0f0f1a;
  --card-bg: #1a1a2e;
  --text: #e8e8f0;
  --text2: #a0a0b8;
  --text3: #6a6a80;
  --border: #2a2a40;
  --accent-light: #1e2040;
  --tag-bg: #1e2040;
  --tag-text: #7c8cff;
  --code-bg: #141428;
  --shadow: 0 1px 3px rgba(0,0,0,.4);

}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height:1.7; }
.container { max-width: 1000px; margin:0 auto; padding: 0 24px; }

/* Header */
.header { padding: 48px 0 32px; text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
.header h1 span { background: linear-gradient(135deg, #4D6BFE, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .sub { color: var(--text3); font-size: 15px; }
.header .badges { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge.blue { background: var(--accent-light); color: var(--accent); }
.badge.green { background: #ecfdf5; color: #10b981; }
.badge.purple { background: #f5f3ff; color: #7c3aed; }
.badge.orange { background: #fffbeb; color: #f59e0b; }

/* Controls */
.controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.search { flex:1; min-width: 240px; padding: 10px 16px; border:1px solid var(--border); border-radius: 10px; font-size:14px; background:var(--card-bg); color:var(--text); outline:none; transition: border-color .2s; }
.search:focus { border-color: var(--accent); }
.tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.tab { padding: 8px 16px; border:1px solid var(--border); border-radius: 8px; font-size:13px; cursor:pointer; background:var(--card-bg); color:var(--text2); transition: all .2s; font-weight:500; white-space: nowrap; }
.tab:hover { border-color: var(--accent); color: var(--accent); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.theme-btn { padding: 8px 12px; border:1px solid var(--border); border-radius: 8px; cursor:pointer; background:var(--card-bg); color:var(--text2); font-size:16px; line-height:1; }
.stats { color: var(--text3); font-size: 13px; margin-left: auto; }

/* QA Card */
.qa-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); transition: box-shadow .2s; }
.qa-card:hover { box-shadow: var(--shadow-hover); }
.qa-card .q-header { padding: 18px 22px; cursor: pointer; display: flex; align-items: flex-start; gap: 14px; user-select: none; }
.qa-card .q-num { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; background: var(--accent-light); color: var(--accent); }
.qa-card .q-num.diff-medium { background: #fffbeb; color: #f59e0b; }
.qa-card .q-num.diff-hard { background: #fef2f2; color: #ef4444; }
.qa-card .q-content { flex:1; }
.qa-card .q-text { font-size: 15px; font-weight: 600; color: var(--text); line-height:1.6; }
.qa-card .q-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.q-tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.q-tag.langgraph { background: #eef2ff; color: #4D6BFE; }
.q-tag.rag { background: #ecfdf5; color: #10b981; }
.q-tag.tools { background: #fef3c7; color: #d97706; }
.q-tag.sse { background: #f0f9ff; color: #0284c7; }
.q-tag.db { background: #fdf2f8; color: #db2777; }
.q-tag.security { background: #fef2f2; color: #ef4444; }
.q-tag.deploy { background: #f5f3ff; color: #7c3aed; }
.q-tag.system { background: #f0fdf4; color: #16a34a; }
.qa-card .q-arrow { color: var(--text3); font-size: 18px; transition: transform .3s; flex-shrink: 0; margin-top: 2px; }
.qa-card.open .q-arrow { transform: rotate(180deg); }

.qa-card .a-body { display: none; padding: 0 22px 22px; border-top: 1px solid var(--border); animation: fadeIn .3s; }
.qa-card.open .a-body { display: block; }
.qa-card .a-body .a-text { padding-top: 18px; font-size: 14px; color: var(--text2); line-height: 1.8; }
.qa-card .a-body .a-text p { margin-bottom: 12px; }
.qa-card .a-body .a-text strong { color: var(--text); }
.qa-card .a-body .a-text ul { margin: 8px 0 12px 20px; }
.qa-card .a-body .a-text ul li { margin-bottom: 6px; }
.qa-card .a-body .a-text code { background: var(--code-bg); padding: 2px 6px; border-radius: 3px; font-size: 12px; color: var(--accent); }
.qa-card .a-body .a-text pre { background: var(--code-bg); padding: 14px 18px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-size: 12px; line-height: 1.6; }
.qa-card .a-body .a-text pre code { background: none; padding: 0; color: var(--text); }

.highlight { background: linear-gradient(180deg, transparent 60%, var(--accent-light) 60%); padding: 0 2px; }

@keyframes fadeIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

.footer { text-align: center; padding: 48px 0 32px; color: var(--text3); font-size: 13px; }

.hidden { display: none !important; }

@media (max-width: 640px) {
  .header h1 { font-size: 22px; }
  .controls { flex-direction: column; }
  .tabs { overflow-x: auto; }
}

<body>

<script>
const questions = [
  // ===== LangGraph =====
  {
    id: 1, cat: "langgraph", diff: "medium",
    q: "LangGraph 中 Agent 的 ReAct 循环是如何实现的？画出图结构并解释关键节点。",
    a: `<p><strong>图结构：</strong></p>
<pre><code>agent_node → [should_continue 路由器]
           ├─ tool_calls → tools_node → agent_node (循环)
           └─ no calls   → END</code></pre>
<p><strong>三个节点：</strong></p>
<ul>
  <li><code>agent_node</code> — 调用 LLM，绑定工具。融合 system_prompt + RAG 上下文 + 工具 schema</li>
  <li><code>tools_node</code> — LangGraph 预构建的 ToolNode，执行 LLM 请求的工具调用，返回 ToolMessage</li>
  <li><code>should_continue</code> — 路由器，检查最后一条消息是否有 tool_calls。有就回 tools，没有就 END</li>
</ul>
<p><strong>关键设计：</strong></p>
<ul>
  <li>使用 <code>StateGraph(AgentState)</code> 构建，<code>add_conditional_edges</code> 实现动态路由</li>
  <li>图按工具签名缓存在 <code>_graph_cache</code> dict 中，避免每次请求重新编译</li>
  <li>硬限制 <strong>10 轮迭代</strong>（should_continue 中检查 iteration >= 10），防止无限循环</li>
  <li>AgentState 的 messages 使用 <code>Annotated[list, add_messages]</code>，通过 reducer 自动追加新消息</li>
</ul>`
  },
  {
    id: 2, cat: "langgraph", diff: "hard",
    q: "看代码：流式执行和非流式执行各用哪个 API，分别用在什么场景？",
    a: `<p><strong>两种模式：</strong></p>
<pre><code># 流式 — 用户实时交互
async for event in graph.astream(initial_state, stream_mode="messages"):
    yield {"type": "token", "content": chunk.content}

# 非流式 — 子 Agent 需要完整结果
final_state = await graph.ainvoke(initial_state)
response = last AIMessage.content</code></pre>
<p><strong>场景选择：</strong></p>
<ul>
  <li><strong>astream（流式）</strong>：主对话 SSE 接口。逐 token 推给前端，用户体验好。stream_mode="messages" 将每次产出解析为 (msg, metadata) 元组</li>
  <li><strong>ainvoke（非流式）</strong>：子 Agent 执行。子 Agent 不需要中间 token，只需要最终完整结果供聚合</li>
</ul>
<p><strong>面试挖坑点</strong>：为什么流式用 <code>asyncio.timeout</code> 包裹？因为 graph.astream 是异步生成器，每个 __anext__() 调用都会被 timeout 包裹，既保护 LLM 调用不超时，也保护工具执行不超时。</p>`
  },
  {
    id: 3, cat: "langgraph", diff: "medium",
    q: "AgentState 用 TypedDict 定义，其中 messages 字段用了 Annotated[list, add_messages]。这个 add_messages 是什么？不加会怎样？",
    a: `<pre><code>class AgentState(TypedDict):
    messages: Annotated[list, add_messages]  # ← 关键
    iteration: int</code></pre>
<p><strong>add_messages 是 LangGraph 内置的 reducer 函数。</strong></p>
<p>TypedDict 默认行为是<strong>覆盖</strong>——每个节点返回的新 state 会完全替换旧值。但 messages 不能覆盖，需要<strong>追加</strong>。</p>
<p>Annotated[type, reducer] 告诉 LangGraph："这个字段不要覆盖，用 reducer 函数合并"。</p>
<p>add_messages 的合并逻辑：
<ul>
  <li>新消息直接追加到列表</li>
  <li>如果新消息和已有消息 ID 相同——<strong>更新</strong>而非重复</li>
  <li>HumanMessage 后的 ToolMessage 自动关联到正确的 tool_call_id</li>
</ul></p>
<p>如果不加 add_messages，每次节点返回的新 messages 会清空历史——Agent 就"失忆"了。</p>`
  },
  // ===== RAG =====
  {
    id: 4, cat: "rag", diff: "hard",
    q: "项目用的是什么检索策略？为什么选择混合检索？RRF 融合算法是怎么工作的？",
    a: `<p><strong>两路检索 + RRF 融合：</strong></p>
<pre><code># 双路并行检索
vector_results = await vector_search(embedding, top_k*3)   # 语义
keyword_results = await keyword_search(query, top_k*3)     # BM25

# RRF 融合
for rank, row in enumerate(vector_results):
    rrf_scores[row.id] += 1.0 / (60 + rank + 1)
for rank, row in enumerate(keyword_results):
    rrf_scores[row.id] += 1.0 / (60 + rank + 1)
sorted_results = sorted by rrf_scores desc</code></pre>
<p><strong>为什么混合检索：</strong></p>
<ul>
  <li><strong>向量语义检索</strong>：擅长语义相近但词不同（"天气怎么样" vs "今天温度"），但可能漏掉精确关键词匹配</li>
  <li><strong>BM25 关键词检索</strong>：擅长精确匹配（专有名词、编号、代码），但不懂同义词</li>
  <li>两者互补。RRF（Reciprocal Rank Fusion）不需要归一化不同量纲的分数，仅用排名信息融合</li>
</ul>
<p><strong>RRF 为什么用 k=60：</strong>实践和学术界（Cormack et al. 2009）的标准值。更小的 k 权重更偏向 top 结果，更大的 k 更平滑。60 是个很好的折中。</p>
<p><strong>面试加分的点</strong>：取 top_k*3 候选再 RRF 融合（扩大召回再用 RRF 重排），比各自取 top_k 再融合效果好。</p>`
  },
  {
    id: 5, cat: "rag", diff: "medium",
    q: "中文文本怎么处理才能被 PostgreSQL tsvector 正确索引？CJK 分词是怎么做的？",
    a: `<pre><code>_CJK_RE = re.compile(r'([\\u4e00-\\u9fff\\u3400-\\u4dbf\\uf900-\\ufaff])')

def _cjk_tokenize(text: str) -> str:
    spaced = _CJK_RE.sub(r' \\1 ', text)  # "今天天气" → " 今 天 天 气 "
    return re.sub(r'\\s+', ' ', spaced).strip().lower()</code></pre>
<p><strong>问题背景：</strong>PostgreSQL 默认的 <code>'simple'</code> 配置按空格分词。中文没有空格，整句话会被当作一个 token——搜索"天气"匹配不到"今天天气很好"。</p>
<p><strong>解决方案：单字分词（Unigram）</strong>——在每个 CJK 字符周围插入空格，然后 tsvector 就能把每个字作为独立 token。这不是真正的分词（不分词），但 BM25 排名仍是有效的。</p>
<p>实现：在写入每个 chunk 时调用 cjk_tokenize 预处理，结果存入 search_vector 列。查询时也做同样处理。Unicode 范围覆盖中日韩统一表意文字。</p>`
  },
  {
    id: 6, cat: "rag", diff: "medium",
    q: "pgvector 的 HNSW 索引是什么？m 和 ef_construction 参数怎么选？",
    a: `<pre><code>CREATE INDEX ... ON document_chunks
USING hnsw (embedding vector_cosine_ops)
WITH (m = 16, ef_construction = 200);</code></pre>
<p><strong>HNSW（Hierarchical Navigable Small World）</strong> 是一种图索引算法，通过构建多层导航图实现近似最近邻搜索。</p>
<ul>
  <li><strong>m = 16</strong>：每个节点最大连接数。更大的 m → 更高精度但更大内存</li>
  <li><strong>ef_construction = 200</strong>：构建时的候选队列大小。更大的值 → 更精确的图但构建更慢</li>
</ul>
<p><strong>为什么选 HNSW 而不是 IVFFlat：</strong></p>
<ul>
  <li>HNSW 查询速度比 IVFFlat 快 5-100 倍（尤其是高维向量）</li>
  <li>不需要训练步骤（IVFFlat 需要先建聚类中心）</li>
  <li>支持增量插入（IVFFlat 插入后需要重建索引）</li>
  <li>内存占用略大，但对 1024 维向量影响可接受</li>
</ul>`
  },
  // ===== 工具系统 =====
  {
    id: 7, cat: "tools", diff: "hard",
    q: "当有 15 个工具时，为什么要对工具做语义路由？Bigram Jaccard 是怎么匹配的？",
    a: `<p><strong>问题：</strong>每次 LLM 调用都把 15 个工具的完整 schema 塞进 prompt，token 消耗巨大，而且 LLM 在 15 个工具里选对的那个也更难。</p>
<p><strong>方案：语义分组 + Bigram Jaccard 匹配</strong></p>
<pre><code># 1. 工具分组
TOOL_GROUPS = {
    "search":      {"tools": ["web_search", "fetch_url", "get_news"], "desc": "网页搜索、URL抓取..."},
    "code_exec":   {"tools": ["run_python_code", ...], "desc": "执行代码、数据分析..."},
    "finance_math":{"tools": ["exchange_rate", "calculator"], "desc": "汇率、金融计算..."},
    ...
}

# 2. Bigram Jaccard 匹配
def _bigram_jaccard(text1, text2):
    b1 = {text1[i:i+2] for i in range(len(text1)-1)}  # "天气查询" → {"天气","气查","查询"}
    b2 = {text2[i:i+2] for i in range(len(text2)-1)}
    return len(b1 & b2) / len(b1 | b2)  # 交集/并集</code></pre>
<p><strong>流程：</strong></p>
<ul>
  <li>用户问"帮我画个柱状图" → bigram 匹配各组的 description，code_exec 得分最高</li>
  <li>取 top_k_groups（默认 2 组）的工具 → 只把 4-6 个工具绑定给 LLM</li>
  <li>元工具（delegate_to_agent, search_knowledge_base）始终绑定，不参与过滤</li>
</ul>
<p><strong>为什么 Bigram Jaccard 而不是 Embedding：</strong>无需 API 调用，零延迟，对中文英文都适用。比关键词匹配更鲁棒（能处理"画图" vs "绘图"这种单字差）。</p>`
  },
  {
    id: 8, cat: "tools", diff: "medium",
    q: "DifySandbox 是怎么集成到项目里的？代码执行的安全保障有几层？",
    a: `<p><strong>架构：</strong>后端通过 async httpx 客户端调用 DifySandbox 容器的 REST API（内网 http://sandbox:8194）。</p>
<p><strong>三层安全防护：</strong></p>
<ol>
  <li><strong>容器隔离（DifySandbox）</strong>：seccomp + capabilities 限制系统调用。网络默认禁用。超时 30 秒。</li>
  <li><strong>代码预检（validate_sandbox_code）</strong>：轻量文本模式匹配
    <ul><li>始终禁止：subprocess、os.system、multiprocessing、shutil.rmtree</li>
    <li>网络禁用时额外禁止：socket、requests、urllib</li>
    <li>长度限制：50,000 字符</li></ul>
  </li>
  <li><strong>沙箱客户端重试 + 熔断</strong>：3 次指数退避重试（0.2s → 0.6s → 1.8s），仅对 ConnectError/ReadError 等网络层错误重试，不对业务错误重试</li>
</ol>
<p>支持 Python、JavaScript、Bash 三种语言，以及 pip install 按需安装依赖。</p>`
  },
  // ===== SSE =====
  {
    id: 9, cat: "sse", diff: "hard",
    q: "SSE 流式输出的完整链路是怎样的？从 FastAPI 到 nginx 到前端，各层做了什么？",
    a: `<p><strong>全链路：</strong></p>
<pre><code>FastAPI backend (StreamingResponse)
  ↓ text/event-stream + X-Accel-Buffering: no
Nginx (proxy)
  ↓ proxy_buffering off; chunked_transfer_encoding on
Browser (EventSource / fetch + ReadableStream)
  ↓ 逐行解析 "data: {...}\\n\\n"</code></pre>
<p><strong>各层关键配置：</strong></p>
<ul>
  <li><strong>FastAPI</strong>：return StreamingResponse(async_generator, media_type="text/event-stream")</li>
  <li>事件格式：每行 data: {json}，事件间用双换行分隔。流结束发 data: [DONE]（兼容 OpenAI 格式）</li>
  <li><strong>Nginx</strong>：proxy_buffering off（关闭代理缓冲，SSE 字节立即转发）；chunked_transfer_encoding on；proxy_read_timeout 300s</li>
  <li><strong>前端</strong>：fetch + ReadableStream + TextDecoder，逐行解析 → React state 更新 → 打字机效果</li>
</ul>

let currentCat = "all";
let currentSearch = "";
let darkTheme = false;
let openCards = new Set();

function filter() {
  currentSearch = document.getElementById("search").value.toLowerCase();
  render();
}

function setCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function toggleTheme() {
  darkTheme = !darkTheme;
  document.documentElement.classList.toggle("dark", darkTheme);
  document.querySelector(".theme-btn").textContent = darkTheme ? "🌙" : "☀";
}

function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  render();
}

function render() {
  let filtered = questions.filter(q => {
    if (currentCat !== "all" && q.cat !== currentCat) return false;
    if (currentSearch && !(q.q.toLowerCase().includes(currentSearch) || q.a.toLowerCase().includes(currentSearch))) return false;
    return true;
  });

  const html = filtered.map(q => `
    <div class="qa-card ${openCards.has(q.id) ? 'open' : ''}" data-cat="${q.cat}">
      <div class="q-header" onclick="toggleCard(${q.id})">
        <div class="q-num ${q.diff === 'hard' ? 'diff-hard' : 'diff-medium'}">${q.id}</div>
        <div class="q-content">
          <div class="q-text">${q.q}</div>
          <div class="q-meta">
            <span class="q-tag ${q.cat}">${{langgraph:'LangGraph',rag:'RAG',tools:'工具',sse:'SSE',db:'数据库',security:'安全',deploy:'部署',system:'系统'}[q.cat]}</span>
            <span class="q-tag" style="background:${q.diff==='hard'?'#fef2f2':'#fffbeb'};color:${q.diff==='hard'?'#ef4444':'#f59e0b'}">${q.diff==='hard'?'困难':'中等'}</span>
          </div>
        </div>
        <span class="q-arrow">▼</span>
      </div>
      <div class="a-body">
        <div class="a-text">${q.a}</div>
      </div>
    </div>
  `).join("");

  document.getElementById("qa-list").innerHTML = html || '<div style="text-align:center;padding:60px 0;color:var(--text3)">没有匹配的面试题</div>';
  document.getElementById("stats").textContent = `${filtered.length} 题`;
}

render();
</script>
